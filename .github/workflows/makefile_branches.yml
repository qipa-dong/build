name: build armbian

on:
  push:
    branches: [ v22.02 ]
  pull_request:
    branches: [ v22.02 ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      with:
        ref: v22.02
    
    - name: configure
      run: ./compile.sh KERNEL_ONLY=no BOARD=tn3399 BRANCH=current RELEASE=jammy BUILD_DESKTOP=no BUILD_MINIMAL=no KERNEL_CONFIGURE=no REPOSITORY_INSTALL="kernel,armbian-firmware" EXTERNAL_NEW=prebuilt COMPRESS_OUTPUTIMAGE="sha,gz"
    
    - name: path
      run: ls output
      
    - name:  upload artifact
      uses: actions/upload-artifact@v3.0.0
      with:
        name: my_artifact
        path: ./output/images/
    
